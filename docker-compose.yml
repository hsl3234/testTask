services:
  mysql:
    image: mysql:8.0
    container_name: phalcon_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-shop}
      MYSQL_USER: ${DB_USER:-shop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-shop}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phalcon_php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-shop}
      DB_USER: ${DB_USER:-shop}
      DB_PASSWORD: ${DB_PASSWORD:-shop}
      APP_ENV: ${APP_ENV:-dev}
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: phalcon_nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "${APP_HOST_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
